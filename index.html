<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎈 Balloon Pop Game</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: linear-gradient(160deg, #e0f7fa 0%, #b3e5fc 40%, #e8f5e9 100%);
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
}

#game {
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 14px 10px; gap: 10px;
}

h1 {
  font-size: 26px; font-weight: 800; color: #1a237e;
  letter-spacing: 2px; text-align: center;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.07);
}

#config {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  background: #fff; border-radius: 20px; padding: 28px 36px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%; max-width: 380px;
}
#config h2 { color: #1565c0; font-size: 17px; }
.cfg-row { display: flex; align-items: center; gap: 12px; width: 100%; }
.cfg-row label { color: #444; font-size: 14px; flex: 1; }
.cfg-row input {
  width: 90px; padding: 7px 10px; border-radius: 10px;
  border: 1.5px solid #b0bec5; font-size: 14px; text-align: center;
  background: #f5f5f5; color: #222;
}
#start-btn {
  margin-top: 4px; padding: 12px 36px; border-radius: 14px; border: none;
  background: #1565c0; color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 12px rgba(21,101,192,0.3); transition: transform 0.15s;
}
#start-btn:hover { transform: scale(1.04); }

#turn-banner {
  padding: 10px 28px; border-radius: 20px; font-size: 16px; font-weight: 700;
  transition: background 0.4s, color 0.4s; text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12); width: 100%; max-width: 720px;
}

#arena {
  display: flex; align-items: flex-end; justify-content: space-between;
  width: 100%; max-width: 720px; gap: 6px;
  background: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 50%, #42a5f5 78%, #1565c0 100%);
  border-radius: 20px; padding: 18px 8px 0 8px;
  min-height: 440px; position: relative; overflow: hidden;
  box-shadow: 0 6px 28px rgba(0,0,0,0.13);
}

#water-layer {
  position: absolute; bottom: 0; left: 0; right: 0; height: 88px;
  background: #1565c0; border-radius: 0 0 20px 20px; overflow: hidden;
}
#water-layer::before {
  content: ''; position: absolute; top: -16px; left: 0; width: 200%; height: 32px;
  background: radial-gradient(ellipse 80px 16px at 12% 50%, #1976d2 78%, transparent 80%),
              radial-gradient(ellipse 80px 16px at 37% 50%, #1976d2 78%, transparent 80%),
              radial-gradient(ellipse 80px 16px at 62% 50%, #1976d2 78%, transparent 80%),
              radial-gradient(ellipse 80px 16px at 87% 50%, #1976d2 78%, transparent 80%);
  animation: waveMove 3s linear infinite;
}
@keyframes waveMove { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

.shark { position: absolute; bottom: 16px; font-size: 28px; }
#shark1 { left: 12%; animation: sw1 5s ease-in-out infinite; }
#shark2 { right: 12%; animation: sw2 4s ease-in-out infinite; }
@keyframes sw1 { 0%,100%{transform:translateX(0) scaleX(1)} 50%{transform:translateX(20px) scaleX(1)} }
@keyframes sw2 { 0%,100%{transform:translateX(0) scaleX(-1)} 50%{transform:translateX(-18px) scaleX(-1)} }

.team-area {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  flex: 1; z-index: 2; padding-bottom: 98px;
}

.team-label {
  font-size: 12px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 5px 14px; border-radius: 14px; margin-bottom: 2px; transition: box-shadow 0.3s;
}
.team-label.blue { background: #1565c0; color: #e3f2fd; }
.team-label.red  { background: #c62828; color: #ffebee; }
.team-label.active-turn { animation: glowPulse 1s ease-in-out infinite; }
@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(255,235,59,0.85); }
  50%     { box-shadow: 0 0 0 9px rgba(255,235,59,0.1); }
}

.score-disp { font-size: 12px; color: #444; font-weight: 600; }

.balloon-cluster { display: block; }

.bln { animation: bobUp var(--bd,2s) ease-in-out infinite var(--bdelay,0s); transform-origin: 50% 100%; }
@keyframes bobUp {
  0%,100% { transform: rotate(-4deg) translateY(0); }
  50%     { transform: rotate(4deg) translateY(-7px); }
}
.bln.popping { animation: burstOut 0.38s ease-out forwards; }
@keyframes burstOut {
  0%  { transform: scale(1);   opacity: 1; }
  45% { transform: scale(1.8); opacity: 0.6; }
  100%{ transform: scale(0);   opacity: 0; }
}

.rope-line {
  width: 2px; height: 22px;
  background: repeating-linear-gradient(180deg,#666 0,#666 4px,#aaa 4px,#aaa 8px);
  margin: 0 auto;
}

.stickman-wrap { width: 62px; height: 102px; }
.stickman-wrap svg { width: 62px; height: 102px; overflow: visible; }
.falling { animation: fallDown 1.8s ease-in forwards; }
@keyframes fallDown {
  0%  { transform: translateY(0)     rotate(0);    opacity:1; }
  65% { opacity:1; }
  100%{ transform: translateY(240px) rotate(215deg); opacity:0; }
}

#center-panel {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  z-index: 3; padding-bottom: 98px; min-width: 138px;
}

#dice-box {
  width: 78px; height: 78px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: 900; cursor: pointer;
  background: #fff; color: #1a237e; border: 3px solid #90a4ae;
  box-shadow: 0 4px 14px rgba(0,0,0,0.13); user-select: none; transition: transform 0.1s;
}
#dice-box:hover { transform: scale(1.06); }
#dice-box.spinning { animation: diceSpin 0.8s ease-out; }
@keyframes diceSpin {
  0%  { transform: rotate(0)      scale(1); }
  30% { transform: rotate(190deg) scale(1.3); }
  70% { transform: rotate(320deg) scale(0.85); }
  100%{ transform: rotate(360deg) scale(1); }
}

#dice-result {
  font-size: 12px; text-align: center; color: #444;
  min-height: 50px; line-height: 1.6; font-weight: 600;
  background: rgba(255,255,255,0.78); border-radius: 10px;
  padding: 5px 8px; width: 132px;
}
#dice-result.neg { color: #b71c1c; }
#dice-result.pos { color: #1b5e20; }

#phase-hint { font-size: 11px; color: #444; text-align: center; min-height: 14px; font-weight: 600; }

#roll-btn {
  padding: 9px 18px; border-radius: 12px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 700; background: #1565c0; color: #fff;
  box-shadow: 0 3px 10px rgba(21,101,192,0.22); transition: all 0.2s;
}
#roll-btn:hover:not(:disabled) { background: #1976d2; transform: scale(1.04); }
#roll-btn:disabled { opacity: 0.34; cursor: not-allowed; }

#next-btn {
  padding: 9px 18px; border-radius: 12px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 700; background: #2e7d32; color: #c8e6c9;
  box-shadow: 0 3px 10px rgba(46,125,50,0.22); transition: all 0.2s; display: none;
}
#next-btn:hover { background: #388e3c; transform: scale(1.04); }

#log {
  width: 100%; max-width: 720px;
  background: rgba(255,255,255,0.65); border-radius: 14px;
  padding: 6px 14px; max-height: 82px; overflow-y: auto;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.log-e { font-size: 12px; color: #555; line-height: 1.9; }
.log-e.blue { color: #1565c0; font-weight: 600; }
.log-e.red  { color: #c62828; font-weight: 600; }

#win-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.78); align-items: center; justify-content: center;
}
#win-overlay.show { display: flex; }
#win-box {
  background: #fff; border-radius: 24px; padding: 40px 52px;
  text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.25);
}
#win-emo  { font-size: 60px; margin-bottom: 10px; }
#win-text { font-size: 28px; font-weight: 800; color: #1a237e; margin-bottom: 6px; }
#win-sub  { font-size: 14px; color: #777; margin-bottom: 22px; }
#restart-btn {
  padding: 12px 34px; border-radius: 14px; border: none; cursor: pointer;
  font-size: 15px; font-weight: 700; background: #1565c0; color: #fff;
  box-shadow: 0 4px 14px rgba(21,101,192,0.28); transition: transform 0.15s;
}
#restart-btn:hover { transform: scale(1.05); }

.burst-p {
  position: fixed; pointer-events: none; z-index: 250; font-size: 18px;
  animation: bFly 0.95s ease-out forwards;
}
@keyframes bFly {
  0%  { transform: translate(0,0) scale(1); opacity: 1; }
  100%{ transform: translate(var(--bx),var(--by)) scale(0.15); opacity: 0; }
}
</style>
</head>
<body>
<div id="game">
  <h1>🎈 Balloon Pop 🎈</h1>

  <div id="config">
    <h2>⚙️ Cài đặt trò chơi</h2>
    <div class="cfg-row">
      <label>Số bóng mỗi đội:</label>
      <input type="number" id="cfg-n" value="12" min="5" max="25">
    </div>
    <div class="cfg-row">
      <label>Tên đội Xanh:</label>
      <input type="text" id="cfg-blue" value="ĐỘI XANH" style="width:130px">
    </div>
    <div class="cfg-row">
      <label>Tên đội Đỏ:</label>
      <input type="text" id="cfg-red" value="ĐỘI ĐỎ" style="width:130px">
    </div>
    <button id="start-btn" onclick="startGame()">🎮 Bắt đầu!</button>
  </div>

  <div id="game-screen" style="display:none;flex-direction:column;align-items:center;gap:8px;width:100%;">
    <div id="turn-banner"> </div>
    <div id="arena">
      <div id="water-layer">
        <div class="shark" id="shark1">🦈</div>
        <div class="shark" id="shark2">🦈</div>
      </div>

      <!-- BLUE -->
      <div class="team-area">
        <div class="team-label blue" id="blue-label">ĐỘI XANH</div>
        <div class="score-disp" id="blue-score">12 bóng</div>
        <svg class="balloon-cluster" id="blue-balloons" viewBox="0 0 160 160" width="160" height="160"></svg>
        <div class="rope-line"></div>
        <div class="stickman-wrap" id="blue-man">
          <svg viewBox="0 0 62 102" xmlns="http://www.w3.org/2000/svg">
            <circle cx="31" cy="14" r="11" fill="#90caf9" stroke="#1565c0" stroke-width="2.2"/>
            <circle cx="27" cy="12.5" r="1.8" fill="#1565c0"/>
            <circle cx="35" cy="12.5" r="1.8" fill="#1565c0"/>
            <path d="M27 18.5 Q31 22.5 35 18.5" stroke="#1565c0" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            <line x1="31" y1="25" x2="31" y2="63" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
            <!-- LEFT arm raised UP — holding balloons -->
            <line x1="31" y1="37" x2="12" y2="17" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
            <!-- RIGHT arm out -->
            <line x1="31" y1="37" x2="51" y2="51" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
            <line x1="31" y1="63" x2="17" y2="86" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
            <line x1="31" y1="63" x2="45" y2="86" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <!-- CENTER -->
      <div id="center-panel">
        <div id="phase-hint">Bắt đầu lăn!</div>
        <div id="dice-box">🎲</div>
        <div id="dice-result">Nhấn Lăn!<br>để bắt đầu</div>
        <button id="roll-btn" onclick="rollDice()">🎲 Lăn!</button>
        <button id="next-btn" onclick="nextTurn()">⏭ Lượt tiếp</button>
      </div>

      <!-- RED -->
      <div class="team-area">
        <div class="team-label red" id="red-label">ĐỘI ĐỎ</div>
        <div class="score-disp" id="red-score">12 bóng</div>
        <svg class="balloon-cluster" id="red-balloons" viewBox="0 0 160 160" width="160" height="160"></svg>
        <div class="rope-line"></div>
        <div class="stickman-wrap" id="red-man">
          <svg viewBox="0 0 62 102" xmlns="http://www.w3.org/2000/svg">
            <circle cx="31" cy="14" r="11" fill="#ef9a9a" stroke="#c62828" stroke-width="2.2"/>
            <circle cx="27" cy="12.5" r="1.8" fill="#c62828"/>
            <circle cx="35" cy="12.5" r="1.8" fill="#c62828"/>
            <path d="M27 18.5 Q31 22.5 35 18.5" stroke="#c62828" stroke-width="1.4" fill="none" stroke-linecap="round"/>
            <line x1="31" y1="25" x2="31" y2="63" stroke="#c62828" stroke-width="3" stroke-linecap="round"/>
            <line x1="31" y1="37" x2="12" y2="17" stroke="#c62828" stroke-width="3" stroke-linecap="round"/>
            <line x1="31" y1="37" x2="51" y2="51" stroke="#c62828" stroke-width="3" stroke-linecap="round"/>
            <line x1="31" y1="63" x2="17" y2="86" stroke="#c62828" stroke-width="3" stroke-linecap="round"/>
            <line x1="31" y1="63" x2="45" y2="86" stroke="#c62828" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
    <div id="log"></div>
  </div>

  <div id="win-overlay">
    <div id="win-box">
      <div id="win-emo">🏆</div>
      <div id="win-text">ĐỘI XANH THẮNG!</div>
      <div id="win-sub">Đội kia rơi xuống biển cá mập 🦈</div>
      <button id="restart-btn" onclick="restartGame()">🔄 Chơi lại</button>
    </div>
  </div>
</div>

<script>
// Dice: ~60% negative (pop enemy), ~40% positive (add own)
const DICE = [
  { v:-1, label:'-1' }, { v:-2, label:'-2' }, { v:-2, label:'-2' },
  { v:-3, label:'-3' }, { v:-3, label:'-3' }, { v:-4, label:'-4' },
  { v:-5, label:'-5' },
  { v:+2, label:'+2' }, { v:+3, label:'+3' }, { v:+4, label:'+4' },
];

// Balloon palettes
const PALETTES = {
  blue: [
    ['#42a5f5','#bbdefb','#1565c0'],
    ['#26c6da','#b2ebf2','#00697a'],
    ['#5c6bc0','#c5cae9','#283593'],
    ['#29b6f6','#b3e5fc','#01579b'],
    ['#7e57c2','#d1c4e9','#4527a0'],
  ],
  red: [
    ['#ef5350','#ffcdd2','#b71c1c'],
    ['#ec407a','#fce4ec','#880e4f'],
    ['#ff7043','#fbe9e7','#bf360c'],
    ['#ab47bc','#f3e5f5','#6a1b9a'],
    ['#ff8f00','#fff8e1','#e65100'],
  ]
};

// Draw one SVG balloon (rounded top, pointed bottom)
function balloonSVG(cx, cy, r, pal, idx) {
  const [body, shine, knot] = pal;
  // Use ellipse taller than wide for classic balloon shape
  const ry = r * 1.25;
  const tipY = cy + ry + 6;
  const sx = cx - r * 0.3, sy = cy - ry * 0.35;
  return `<g class="bln" style="--bd:${1.9+idx*0.13}s;--bdelay:${idx*0.19}s" data-i="${idx}">
    <ellipse cx="${cx}" cy="${cy}" rx="${r}" ry="${ry}" fill="${body}"/>
    <ellipse cx="${sx}" cy="${sy}" rx="${r*0.22}" ry="${r*0.14}" fill="${shine}" opacity="0.72" transform="rotate(-28,${sx},${sy})"/>
    <polygon points="${cx-3.5},${cy+ry+1} ${cx+3.5},${cy+ry+1} ${cx},${tipY}" fill="${knot}"/>
    <circle cx="${cx}" cy="${cy+ry+2}" r="3.8" fill="${knot}"/>
  </g>`;
}

function renderBalloons(team) {
  const count = S[team+'Balloons'];
  const pals  = PALETTES[team];
  const svg   = document.getElementById(team+'-balloons');

  const cols  = count <= 4 ? count : count <= 8 ? 4 : count <= 12 ? 4 : 5;
  const rows  = Math.ceil(count / cols);
  const r     = cols >= 5 ? 14 : 16;
  const padX  = 14, padY = 18;
  const gapX  = cols > 1 ? (160 - 2*padX - 2*r) / (cols-1) : 0;
  const gapY  = r*2.8;
  const svgH  = padY + rows*r*2.55 + (rows-1)*(gapY - r*2.55) + 20;

  let html = ''; let i = 0;
  for (let row = 0; row < rows; row++) {
    const inRow = (row===rows-1) ? (count - row*cols) : cols;
    const rowOffX = (cols - inRow) * gapX / 2;
    for (let col = 0; col < inRow; col++) {
      const cx = padX + r + rowOffX + col * gapX;
      const cy = padY + r*1.25 + row * gapY;
      html += balloonSVG(cx, cy, r, pals[i % pals.length], i);
      i++;
    }
  }

  svg.setAttribute('viewBox', `0 0 160 ${Math.max(svgH, 40)}`);
  svg.setAttribute('height', Math.max(svgH, 40));
  svg.innerHTML = html;
  document.getElementById(team+'-score').textContent = count + ' bóng';
}

let S = {};

function startGame() {
  const n = Math.max(5, Math.min(25, parseInt(document.getElementById('cfg-n').value)||12));
  const bN = document.getElementById('cfg-blue').value.trim() || 'ĐỘI XANH';
  const rN = document.getElementById('cfg-red').value.trim()  || 'ĐỘI ĐỎ';
  S = { bName:bN, rName:rN, blueBalloons:n, redBalloons:n, max:n, turn:'blue', round:1, phase:'idle', gameOver:false, maxTurns:12 };
  document.getElementById('blue-label').textContent = bN;
  document.getElementById('red-label').textContent  = rN;
  document.getElementById('config').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  renderBalloons('blue'); renderBalloons('red');
  updateUI();
  addLog(`🎮 Trò chơi bắt đầu! Mỗi đội có ${n} bóng bay.`, '');
}

function updateUI() {
  const t = S.turn;
  const aN = t==='blue' ? S.bName : S.rName;
  const dN = t==='blue' ? S.rName : S.bName;
  const col = t==='blue' ? '#1565c0' : '#c62828';
  const tc  = t==='blue' ? '#e3f2fd' : '#ffebee';
  const b   = document.getElementById('turn-banner');
  b.textContent = `🎯 Lượt ${S.round}/${S.maxTurns}: ${aN} tấn công ${dN}!`;
  b.style.background = col; b.style.color = tc;
  document.getElementById('blue-label').classList.toggle('active-turn', t==='blue');
  document.getElementById('red-label').classList.toggle('active-turn', t==='red');
  const idle = S.phase==='idle', done = S.phase==='done';
  document.getElementById('roll-btn').disabled = !idle || S.gameOver;
  document.getElementById('roll-btn').style.display = done ? 'none' : 'block';
  document.getElementById('next-btn').style.display = (done && !S.gameOver) ? 'block' : 'none';
  if (idle) {
    document.getElementById('phase-hint').textContent = `👇 ${aN} lăn xúc xắc!`;
    document.getElementById('dice-box').textContent = '🎲';
    document.getElementById('dice-box').style.fontSize = '30px';
    document.getElementById('dice-box').style.color = '#1a237e';
    document.getElementById('dice-result').textContent = 'Nhấn Lăn!\nđể bắt đầu';
    document.getElementById('dice-result').className = '';
  }
}

function rollDice() {
  if (S.phase !== 'idle' || S.gameOver) return;
  S.phase = 'rolling';
  document.getElementById('roll-btn').disabled = true;
  const face = DICE[Math.floor(Math.random() * DICE.length)];
  const atk  = S.turn, def = atk==='blue' ? 'red' : 'blue';
  const aN   = atk==='blue' ? S.bName : S.rName;
  const dN   = def==='blue' ? S.bName : S.rName;

  const dEl = document.getElementById('dice-box');
  dEl.classList.add('spinning');
  const spins = ['-1','-2','-3','+2','+3','-4','+4','-5','-2','-3','+2'];
  let si = 0;
  const t = setInterval(() => {
    dEl.textContent = spins[si++ % spins.length];
    dEl.style.fontSize = '22px';
    if (si >= 11) {
      clearInterval(t);
      dEl.classList.remove('spinning');
      dEl.textContent = face.label;
      dEl.style.color = face.v < 0 ? '#b71c1c' : '#1b5e20';
      dEl.style.fontSize = '26px';
      afterSpin(face, atk, def, aN, dN);
    }
  }, 90);
}

function afterSpin(face, atk, def, aN, dN) {
  const rEl = document.getElementById('dice-result');
  const v   = face.v;

  if (v < 0) {
    const remove = Math.min(Math.abs(v), S[def+'Balloons']);
    rEl.className = 'neg';
    rEl.innerHTML = `<b style="font-size:17px;color:#b71c1c">${face.label}</b><br>${aN} phá<br><b>${remove} bóng</b> của ${dN}!`;
    document.getElementById('phase-hint').textContent = '💥 Chờ xem bóng nổ...';
    // ── WAIT 2s so students can read ──
    setTimeout(() => {
      popOneByOne(def, remove, () => {
        S[def+'Balloons'] = Math.max(0, S[def+'Balloons'] - remove);
        document.getElementById(def+'-score').textContent = S[def+'Balloons'] + ' bóng';
        addLog(`💥 ${aN} tung ${face.label} → phá ${remove} bóng của ${dN}`, atk);
        finishRoll();
      });
    }, 2000);
  } else {
    rEl.className = 'pos';
    rEl.innerHTML = `<b style="font-size:17px;color:#1b5e20">${face.label}</b><br>${aN} thêm<br><b>${v} bóng</b> cho mình! 🎈`;
    document.getElementById('phase-hint').textContent = '🎈 Đang thêm bóng...';
    // ── WAIT 2s ──
    setTimeout(() => {
      S[atk+'Balloons'] += v;
      renderBalloons(atk);
      addLog(`🎈 ${aN} tung ${face.label} → thêm ${v} bóng cho mình`, atk);
      finishRoll();
    }, 2000);
  }
}

// Pop balloons ONE BY ONE, 0.5s gap between each
function popOneByOne(team, count, onDone) {
  const svg  = document.getElementById(team+'-balloons');
  const blns = Array.from(svg.querySelectorAll('.bln'));
  const toGo = blns.slice(-count);
  if (!toGo.length) { onDone(); return; }
  let done = 0;
  toGo.forEach((g, i) => {
    setTimeout(() => {
      const el = g.querySelector('ellipse');
      if (el) {
        const r = el.getBoundingClientRect();
        spawnBurst(r.left + r.width/2, r.top + r.height/2);
      }
      g.classList.add('popping');
      setTimeout(() => {
        g.remove(); done++;
        if (done === toGo.length) onDone();
      }, 400);
    }, i * 500); // ← 0.5s between each pop
  });
}

function spawnBurst(x, y) {
  ['✨','💥','⭐','💫','🌟','❗','🎊'].forEach((ch, i) => {
    const p = document.createElement('div');
    p.className = 'burst-p';
    p.textContent = ch;
    const ang = (i / 7) * Math.PI * 2 + Math.random() * 0.4;
    const d   = 48 + Math.random() * 64;
    p.style.cssText = `left:${x}px;top:${y}px;--bx:${Math.cos(ang)*d}px;--by:${Math.sin(ang)*d}px`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  });
}

function finishRoll() {
  S.phase = 'done';
  document.getElementById('phase-hint').textContent = '✅ Xong! Nhấn Lượt tiếp';
  document.getElementById('roll-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'block';
  setTimeout(checkWin, 300);
}

function checkWin() {
  if (S.blueBalloons <= 0) triggerWin('red');
  else if (S.redBalloons <= 0) triggerWin('blue');
}

function triggerWin(winner) {
  S.gameOver = true;
  const loser = winner==='blue' ? 'red' : 'blue';
  const wN = winner==='blue' ? S.bName : S.rName;
  document.getElementById(loser+'-man').classList.add('falling');
  addLog(`🏆 ${wN} THẮNG! Nhân vật đội kia rơi xuống biển! 🦈`, winner);
  document.getElementById('next-btn').style.display = 'none';
  setTimeout(() => {
    document.getElementById('win-text').textContent = `${wN.toUpperCase()} THẮNG! 🏆`;
    document.getElementById('win-overlay').classList.add('show');
  }, 2400);
}

function nextTurn() {
  // stop at 12 turns (after red finishes last turn)
  if (S.round >= S.maxTurns && S.turn === 'red') {
    endGameByTurn();
    return;
  }

  S.turn = S.turn==='blue' ? 'red' : 'blue';
  if (S.turn==='blue') S.round++;

  S.phase = 'idle';
  updateUI();
}

function addLog(msg, team) {
  const log = document.getElementById('log');
  const d   = document.createElement('div');
  d.className = 'log-e '+(team||'');
  d.textContent = msg;
  log.prepend(d);
  while (log.children.length > 12) log.lastChild.remove();
}

function endGameByTurn() {
  S.gameOver = true;

  if (S.blueBalloons > S.redBalloons) triggerWin('blue');
  else if (S.redBalloons > S.blueBalloons) triggerWin('red');
  else {
    document.getElementById('win-text').textContent = `HÒA! 🤝`;
    document.getElementById('win-overlay').classList.add('show');
  }
}

function restartGame() {
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('config').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('log').innerHTML = '';
  document.getElementById('blue-man').classList.remove('falling');
  document.getElementById('red-man').classList.remove('falling');
}
</script>
